    <div class="container event_manager">
        <h2>API Requests & Async JS <br/> <span class="h1">(Ajax Programming)</span></h2>
        <!-- Now we will make a card(image, name, email, etc) with github api  -->
        <!-- XMLHttpRequest => XMLHttpRequestEventTarget => EventTarget -->

        <div id="user_profile_card"></div>


    </div>
    
    <script>
        /*
         github api(api.github.com/users/mazharul77),
         XMLHttpRequest,
          0.unsent: only client is created
           1. open(),
            2.send():  headers_reveived;
             3.loading
              4.done, 

              readyState, onreadystatechange, reponse
        */

        /* let's observe the XMLHttpRequest object's properties and methods in console */
        const url = "https://api.github.com/users/mazharul77";
        
        const XHR = new XMLHttpRequest();
        console.log("Initial XHR: ", XHR);

        XHR.open("GET", url);
        console.log("After Open(): ", XHR);
        console.log("After Open() readyState val: ", XHR.readyState);

        XHR.onreadystatechange = function(){
            console.log("After open(), Inside onreadystatechange val:", XHR.readyState);
            
            if (XHR.readyState === 4){
                //resonseText is a string and we need to parse it to a js object
                const user_profile_card = document.getElementById("user_profile_card");

                const respData = JSON.parse(this.responseText);
                console.log("Response Data: ", respData);
                console.log("User Login:", respData.login, " and image:", respData.avatar_url);
                user_profile_card.innerHTML = `
                    <div class="card" style="width: 18rem;">
                        <img src="${respData.avatar_url}" class="card-img-top" alt="User Avatar">
                        <div class="card-body">
                            <h5 class="card-title">${respData.login}</h5>
                            <h5 class="card-text">${respData.name}</h5>
                            <p class="card-text">Public Repositories: ${respData.public_repos}</p>
                        </div>
                    </div>
                `;
            }
        }

        XHR.send();
        console.log("After send(): ", XHR);
        console.log("After send() readyState val: ", XHR.readyState);

    </script>
    <!-- <script src="api_requests.js"></script> -->
