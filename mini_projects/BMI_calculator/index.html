    <div class="container">
        <h1>BMI Calculator</h1>
        <form>
            <p> <label> Weight (KG): </label> <input type="text" id="weight" /> </p>
            <p> <label> Height (CM): </label> <input type="text" id="height" /> </p>
            <button>Calculate BMI</button>
            <div id="results"></div>
            <p id="userText"></p>
            <div id="weight-guide">
                <h2>==== Body Mass Index Weight Guidance =====</h2>
                <code>
                    <h4>
                        BMI
                        < 18.6
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                        : Under Weight <br />
                        
                        18.6
                        <= BMI <=24.9 : Normal Range <br />
                        
                        BMI > 24.9
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                        : Overweight <br />
                    <h4/>
                </code>
            </div>
        </form>
    </div>
</body>
